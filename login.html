<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MAHFUZ BD | Command Center Access</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <!-- Stylesheets -->
    <link rel="stylesheet" href="style.min.css"/>
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 24px 80px 24px;
        }
        .login-card {
            width: 100%;
            max-width: 480px;
            padding: 48px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            transform-style: preserve-3d;
            transition: transform 0.1s ease;
        }
        .input-line {
            background: transparent !important;
            border: none !important;
            border-bottom: 1px solid var(--color-outline-variant) !important;
            border-radius: 0 !important;
            padding: 12px 0 !important;
            color: var(--color-secondary) !important;
        }
        .input-line:focus {
            border-bottom-color: var(--color-primary-container) !important;
            box-shadow: none !important;
        }
        .login-err {
            background: rgba(255, 180, 171, 0.1);
            border: 1px solid var(--color-error);
            color: var(--color-error);
            border-radius: var(--radius-lg);
            padding: 12px;
            font-size: 12px;
            font-weight: 600;
            width: 100%;
            text-align: center;
            display: none;
            margin-bottom: 24px;
        }
        .checkbox-container {
            display: flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }
        .checkbox-container input {
            width: auto;
            margin-right: 8px;
            background: var(--bg-surface-hover);
            border-color: var(--color-outline-variant);
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>

    <!-- Navigation Header -->
    <header class="glass-header">
        <div class="container nav-container">
            <div class="text-headline-lg" style="font-size: 24px; font-weight: 700; letter-spacing: 0.05em;">
                <a href="index.html" style="text-decoration: none; color: inherit;">MAHFUZ<span class="text-primary">.</span></a>
            </div>
            <nav class="nav-links">
                <a class="text-label-caps" href="index.html">Main Website</a>
            </nav>
        </div>
    </header>

    <!-- Main Entry Container -->
    <main>
        <div class="perspective-wrapper">
            <div class="glass-card login-card">
                <!-- Operation Badge -->
                <div style="background: var(--bg-surface-hover); border: 1px solid var(--color-outline); padding: 6px 12px; border-radius: var(--radius-sm); display: inline-block; margin-bottom: 24px;">
                    <span class="text-label-caps text-muted" style="font-size: 10px;">Asia Operations Unit</span>
                </div>
                
                <!-- Title Header -->
                <div style="margin-bottom: 40px; text-align: center;">
                    <h1 class="text-headline-lg" style="font-size: 32px; margin-bottom: 8px;">MAHFUZ BD</h1>
                    <p class="text-muted" style="font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em;">Command Center Access</p>
                </div>

                <!-- Error Container -->
                <div id="loginErrorMsg" class="login-err"></div>

                <!-- Identity inputs -->
                <form id="loginForm" style="display: flex; flex-direction: column; gap: 24px;">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label>Email / Username</label>
                        <input id="usernameInput" type="text" class="input-line" placeholder="admin@mahfuzbd.com" required/>
                    </div>
                    
                    <div class="form-group" style="margin-bottom: 0;">
                        <label>Password</label>
                        <div style="position: relative; width: 100%;">
                            <input id="passwordField" type="password" class="input-line" placeholder="••••••••••••" required style="padding-right: 40px !important;"/>
                            <button type="button" class="toggle-password-btn" onclick="togglePassword()" style="position: absolute; right: 0; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--color-text-muted); cursor: pointer; display: flex; align-items: center;">
                                <span class="material-symbols-outlined" style="font-size: 20px;">visibility</span>
                            </button>
                        </div>
                    </div>

                    <!-- Controls -->
                    <div style="display: flex; justify-content: space-between; align-items: center; font-size: 12px; margin: 8px 0;">
                        <label class="checkbox-container">
                            <input type="checkbox"/>
                            <span class="text-label-caps text-muted" style="font-size: 11px;">Remember Me</span>
                        </label>
                        <a href="#" style="color: var(--color-primary-container); text-decoration: none;" class="text-label-caps">Forgot Password?</a>
                    </div>

                    <!-- Submit Action -->
                    <button id="loginSubmitBtn" type="submit" class="btn btn-primary" style="padding: 16px; font-weight: 700; width: 100%; border-radius: var(--radius-lg);">
                        Login to Dashboard
                        <span class="material-symbols-outlined" style="margin-left: 8px;">arrow_forward</span>
                    </button>
                </form>

                <!-- Divider line -->
                <div style="display: flex; align-items: center; gap: 16px; margin: 32px 0;">
                    <div style="flex-grow: 1; height: 1px; background: var(--color-outline-variant);"></div>
                    <span class="text-label-caps text-muted" style="font-size: 10px; opacity: 0.5;">Or continue with</span>
                    <div style="flex-grow: 1; height: 1px; background: var(--color-outline-variant);"></div>
                </div>

                <!-- Social credentials -->
                <div class="social-login-grid">
                    <button class="social-login-btn rounded-xl" style="font-size: 12px; border-radius: var(--radius-lg);">
                        <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuAf9iJihtPIEBvtOpY15IuOsMWjeXCb4A1Vhcg8kulNVcdVVbEYxbe6IgqgtAq5i1nrqS-QlLpyTbVI5bxfdqHylF1MxUN9yISq5gXdp2Kpk8SwBoN4dowGo4swLeEmZ-oAu0MKz_mLzx1UvjCrxkI2vheEM-7IHphSU_VegzZcQpO2oKwHlmVdZABNKncVKrRz-YuKIhsewWlIbq_BHLJOg0gJjRMIZoB4oX2wFKMsEBB6U6-GDwmES54tAA4wWGfESf0IuF7ripc" alt="Google Logo"/>
                        <span>Google</span>
                    </button>
                    <button class="social-login-btn rounded-xl" style="font-size: 12px; border-radius: var(--radius-lg);">
                        <svg viewbox="0 0 24 24" style="fill: var(--color-text-muted); width: 20px; height: 20px;"><path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14m-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 0 1 1.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 0 0 1.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 0 0-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37h2.77z"></path></svg>
                        <span>LinkedIn</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer" style="padding-top: 32px; padding-bottom: 32px; background: rgba(0, 0, 0, 0.4);">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
            <span class="text-label-caps text-muted" style="font-size: 11px;">© 2024 MAHFUZ BD. ALL RIGHTS RESERVED.</span>
            <div style="display: flex; align-items: center; gap: 12px;">
                <div class="pulse-indicator pulse-green"></div>
                <span class="text-label-caps text-tertiary" style="font-size: 11px; letter-spacing: 0.05em;">SYSTEM STATUS: OPERATIONAL</span>
            </div>
        </div>
    </footer>

    <!-- Script connection -->
    <script src="js/login.min.js"></script>
</body>
</html>
